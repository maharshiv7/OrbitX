<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrbitX - Exoplanet Database</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            background-color: #010204;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            min-height: 100vh;
        }

        /* 3D Background Canvas */
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #00d2ff;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
            border: 1px solid #00d2ff;
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        #back-btn:hover { background: #00d2ff; color: #000; box-shadow: 0 0 15px #00d2ff;}

        header { text-align: center; margin-bottom: 40px; margin-top: 20px;}
        h1 { margin: 0; font-size: 36px; letter-spacing: 4px; color: #00d2ff; text-shadow: 0 0 20px rgba(0, 210, 255, 0.5); text-transform: uppercase;}
        .subtitle { color: #888; font-size: 14px; letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; }

        /* --- CONTROL PANEL (SLIDERS) --- */
        .control-panel {
            background: rgba(15, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .slider-group {
            width: 40%;
            text-align: center;
        }

        .slider-label {
            font-size: 14px;
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .slider-value { color: #fff; font-size: 18px; margin-left: 10px; text-shadow: 0 0 10px #00d2ff;}

        input[type=range] {
            width: 100%;
            -webkit-appearance: none;
            background: transparent;
            margin-top: 15px;
        }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; border: 1px solid rgba(0, 210, 255, 0.2);
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: #00d2ff; cursor: pointer; margin-top: -8px; box-shadow: 0 0 15px #00d2ff;
        }

        /* --- DATA TABLE --- */
        .table-container {
            background: rgba(5, 10, 15, 0.8);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
            backdrop-filter: blur(5px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(0, 210, 255, 0.1);
            color: #00d2ff;
            padding: 15px 20px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            white-space: nowrap;
        }

        td {
            padding: 15px 20px;
            color: #ddd;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 15px;
        }

        tr:hover td {
            background: rgba(0, 210, 255, 0.05);
            color: #fff;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
            color: #aaa;
        }

        #loading { color: #ffdd00; display: none; font-weight: bold; animation: pulse 1s infinite;}
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* =========================================
           📱 MOBILE RESPONSIVE FIX
           ========================================= */
        @media (max-width: 768px) {
            #ui-layer { padding: 80px 15px 20px; } /* Header padding fix */
            #back-btn { top: 15px; left: 15px; font-size: 12px; padding: 6px 12px; }
            h1 { font-size: 26px; }
            .subtitle { font-size: 11px; }

            .control-panel {
                flex-direction: column; /* Sliders stack on mobile */
                gap: 30px;
                padding: 20px;
            }
            .slider-group { width: 100%; }

            th, td { padding: 12px 10px; font-size: 13px; }
            .status-bar { flex-direction: column; gap: 10px; text-align: center; }
        }
        /* 🔴 EXIT BUTTON CSS */
        #exit-btn {
            position: absolute;
            top: 25px;
            right: 30px;
            color: #ff4444;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 68, 68, 0.4);
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(15, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 2000; /* Z-index high rakha hai taaki hamesha upar dikhe */
        }
        #exit-btn:hover { 
            background: #ff4444; 
            color: #fff; 
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.8); 
            border-color: #ff4444;
        }

        /* Mobile responsive ke liye */
        @media (max-width: 768px) {
            #exit-btn { top: 15px; right: 15px; font-size: 12px; padding: 6px 12px; }
        }
    </style>
</head>
<body>

<a href="index.html#menu" id="exit-btn"><i class="fas fa-door-open"></i> EXIT</a>
    <div id="ui-layer">
        <header>
            <h1>Exoplanet Archive</h1>
            <div class="subtitle">Live Query Engine powered by NASA Data</div>
        </header>

        <div class="control-panel">
            <div class="slider-group">
                <div class="slider-label">Max Distance from Earth: <span class="slider-value" id="dist-val">10000 LY</span></div>
                <input type="range" id="dist-slider" min="4" max="10000" value="10000" step="10">
            </div>

            <div class="slider-group">
                <div class="slider-label">Max Planet Radius: <span class="slider-value" id="size-val">100 x Earth</span></div>
                <input type="range" id="size-slider" min="0.5" max="100" value="100" step="0.5">
            </div>
        </div>

        <div class="status-bar">
            <div><strong>Matches Found:</strong> <span id="match-count" style="color:#00d2ff;">0</span> (Displaying closest 50)</div>
            <div id="loading">📡 Querying Python Engine...</div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Planet Name</th>
                        <th>Distance (Light Years)</th>
                        <th>Radius (vs Earth)</th>
                        <th>Discovery Year</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 1;
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const starGeo = new THREE.BufferGeometry();
        const starVertices = [];
        for(let i=0; i<3000; i++) {
            starVertices.push((Math.random() - 0.5) * 600, (Math.random() - 0.5) * 600, (Math.random() - 0.5) * 600);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.5 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        function animate() {
            stars.rotation.y += 0.0003;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); });
    </script>

    <script>
        const distSlider = document.getElementById('dist-slider');
        const sizeSlider = document.getElementById('size-slider');
        const distVal = document.getElementById('dist-val');
        const sizeVal = document.getElementById('size-val');
        const tableBody = document.getElementById('table-body');
        const matchCount = document.getElementById('match-count');
        const loadingStr = document.getElementById('loading');

        // Function: Backend se data lana
        function fetchExoplanets() {
            // Sliders ki current value padhna
            const maxDist = distSlider.value;
            const maxSize = sizeSlider.value;

            // UI update karna
            distVal.innerText = maxDist + " LY";
            sizeVal.innerText = maxSize + " x Earth";
            loadingStr.style.display = "block";

            // Python Backend ko REST API call marna
            fetch(`http://127.0.0.1:5000/api/exoplanets?max_dist=${maxDist}&max_size=${maxSize}`)
                .then(response => response.json())
                .then(data => {
                    loadingStr.style.display = "none";
                    if(data.status === "success") {
                        matchCount.innerText = data.total_matches;
                        
                        // Table clear karo
                        tableBody.innerHTML = "";

                        // Naya data table mein bharo
                        data.data.forEach(planet => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td style="font-weight: bold; color: #fff;">${planet.name}</td>
                                <td>${planet.distance_ly} LY</td>
                                <td>${planet.radius_earth} Earths</td>
                                <td>${planet.year}</td>
                            `;
                            tableBody.appendChild(row);
                        });

                        // Agar koi planet na mile
                        if(data.data.length === 0) {
                            tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#ff4444;">No planets found matching these criteria! Try increasing the sliders.</td></tr>`;
                        }
                    }
                })
                .catch(error => {
                    loadingStr.style.display = "none";
                    console.error("Error fetching data:", error);
                    tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#ff4444;">Error connecting to Python Engine. Is your app.py running?</td></tr>`;
                });
        }

        // Sliders par Event Listeners lagana (Jaise hi slider hilega, fetch call jayegi!)
        // 'input' event real-time fast updating ke liye hai
        distSlider.addEventListener('input', fetchExoplanets);
        sizeSlider.addEventListener('input', fetchExoplanets);

        // Page load hone par pehli baar data laao
        fetchExoplanets();

    </script>
</body>
</html>
