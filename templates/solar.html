<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrbitX - Solar Weather Threat Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { margin: 0; background-color: #020202; font-family: 'Courier New', Courier, monospace; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #top-navbar { width: 100%; background: rgba(10, 15, 25, 0.9); border-bottom: 1px solid rgba(255, 221, 0, 0.3); display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; box-sizing: border-box; }
        .nav-logo { color: #ffdd00; font-size: 24px; font-weight: bold; text-decoration: none; letter-spacing: 3px; }
        .back-btn { background: transparent; border: 1px solid #ffdd00; color: #ffdd00; padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; transition: 0.3s; }
        .back-btn:hover { background: rgba(255, 221, 0, 0.2); }
        
        .container { width: 90%; max-width: 800px; margin-top: 50px; }
        .header-title { font-size: 2rem; color: #ffdd00; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px rgba(255, 221, 0, 0.5); border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { font-size: 14px; background: rgba(255, 170, 0, 0.2); border: 1px solid #ffaa00; padding: 5px 10px; border-radius: 4px; color: #ffaa00; animation: blink 2s infinite; }

        .cme-card { background: rgba(15, 20, 30, 0.8); border: 1px solid #333; padding: 20px; margin-bottom: 15px; border-radius: 8px; border-left: 5px solid #ffaa00; position: relative; overflow: hidden; animation: threatPulse 2s infinite; }
        
        @keyframes threatPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 170, 0, 0.2); }
            70% { box-shadow: 0 0 15px 10px rgba(255, 170, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 170, 0, 0); }
        }

        .cme-id { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #ffaa00; }
        .cme-details { color: #aaa; line-height: 1.6; }
        .cme-note { margin-top: 10px; font-size: 0.9em; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; border-left: 2px solid #ffdd00; color: #ccc; }
        
        .loader { color: #ffdd00; font-size: 1.2rem; margin-top: 50px; text-align: center; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <nav id="top-navbar">
        <a href="index.html" class="nav-logo">OrbitX // Solar Weather</a>
        <a href="index.html#menu" class="back-btn">⬅ RETURN TO TERMINAL</a>
    </nav>

    <div class="container">
        <div class="header-title">
            > HELIOPHYSICS RADAR
            <div class="status-badge">SHIELDS MONITORED</div>
        </div>
        
        <div id="solar-data-container">
            <div class="loader">> ALIGNING WITH SOHO/STEREO SATELLITES...</div>
        </div>
    </div>

    <script>
        window.onload = () => {
            fetch('http://127.0.0.1:5000/api/solar_weather')
                .then(response => response.json())
                .then(res => {
                    const container = document.getElementById('solar-data-container');
                    container.innerHTML = ''; 

                    if(res.status === "error") {
                        container.innerHTML = `<span style="color: red;">> ${res.message}</span>`;
                        return;
                    }

                    if(res.data.length === 0) {
                        container.innerHTML = `<span style="color: #00ffcc;">> NO MAJOR SOLAR THREATS DETECTED IN THE LAST 30 DAYS.</span>`;
                        return;
                    }

                    res.data.forEach(cme => {
                        let card = `
                            <div class="cme-card">
                                <div class="cme-id">EVENT ID: ${cme.activityID}</div>
                                <div class="cme-details">
                                    > DETECTED ON: ${cme.startTime}<br>
                                    > OBSERVING SENSORS: ${cme.instruments.join(', ')}
                                </div>
                                <div class="cme-note">
                                    > DECRYPTED ANALYSIS: ${cme.note}
                                </div>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
                })
                .catch(err => {
                    document.getElementById('solar-data-container').innerHTML = `<span style="color: red;">> SYSTEM ERROR: LOST CONNECTION TO HELIO-SENSORS.</span>`;
                });
        };
    </script>
</body>
</html>
