<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OrbitX - Constellations Guide</title>
    <style>
        body {
            margin: 0;
            background-color: #010308;
            background-image: radial-gradient(circle at 50% 0%, #0a1526 0%, #010308 80%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header { text-align: center; padding: 40px 20px 20px; }
        h1 {
            margin: 0; font-size: 36px; letter-spacing: 4px; text-transform: uppercase;
            color: #ffdd00; text-shadow: 0 0 20px rgba(255, 221, 0, 0.4);
        }
        .subtitle { color: #aaaaaa; font-size: 14px; letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; }

        #back-btn {
            position: absolute; top: 30px; left: 30px; color: #ffdd00; text-decoration: none;
            font-size: 14px; letter-spacing: 1px; border: 1px solid #ffdd00; padding: 8px 15px;
            border-radius: 20px; transition: all 0.3s;
        }
        #back-btn:hover { background: #ffdd00; color: #000; box-shadow: 0 0 15px rgba(255, 221, 0, 0.5); }

        /* --- CSS GRID GALLERY --- */
        #gallery-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto;
        }

        .const-card {
            background: rgba(15, 20, 30, 0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 221, 0, 0.2); border-radius: 15px; overflow: hidden;
            cursor: pointer; transition: all 0.4s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .const-card:hover {
            transform: translateY(-10px); border-color: #ffdd00; box-shadow: 0 15px 40px rgba(255, 221, 0, 0.2);
        }

        .card-image-wrapper { width: 100%; height: 200px; overflow: hidden; position: relative; background: #000;}
        .card-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; opacity: 0.95;}
        .const-card:hover .card-image { transform: scale(1.1); opacity: 1;}

        .card-content { padding: 20px; text-align: center; }
        .card-title { font-size: 24px; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .card-shape { font-size: 12px; color: #ffdd00; text-transform: uppercase; letter-spacing: 1px; }

        /* --- MODAL (POPUP) --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            background: rgba(10, 15, 25, 0.95); border: 1px solid #ffdd00; border-radius: 20px;
            width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto;
            display: flex; flex-direction: column; position: relative;
            transform: scale(0.9); transition: transform 0.3s ease;
            box-shadow: 0 0 50px rgba(255, 221, 0, 0.2);
        }
        #modal-overlay.active .modal-box { transform: scale(1); }
        .modal-box::-webkit-scrollbar { width: 6px; }
        .modal-box::-webkit-scrollbar-thumb { background: #ffdd00; border-radius: 10px; }

        .modal-close {
            position: absolute; top: 15px; right: 20px; background: rgba(0,0,0,0.8);
            color: #ffdd00; border: 1px solid #ffdd00; border-radius: 50%;
            width: 35px; height: 35px; font-size: 18px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; transition: all 0.2s; z-index: 10;
        }
        .modal-close:hover { background: #ffdd00; color: #000; }

        .modal-image { width: 100%; height: 350px; object-fit: contain; border-bottom: 2px solid rgba(255, 221, 0, 0.3); background: #fff;}

        .modal-info { padding: 30px; }
        .modal-title { font-size: 36px; color: #fff; margin: 0 0 5px 0; text-shadow: 0 0 10px #ffdd00;}
        .modal-shape { font-size: 16px; color: #ffdd00; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; }

        .info-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }

        .info-item { background: rgba(255, 221, 0, 0.05); padding: 15px; border-radius: 10px; border-left: 3px solid #ffdd00; }
        .info-item span { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;}
        .info-item strong { color: #fff; font-size: 15px; line-height: 1.4;}

        .specialty-box {
            font-size: 15px; line-height: 1.6; color: #eee;
            background: linear-gradient(90deg, rgba(255, 221, 0, 0.1), transparent);
            padding: 20px; border-radius: 10px; border-left: 4px solid #ffdd00;
        }
        .specialty-box span { display: block; font-size: 12px; color: #ffdd00; text-transform: uppercase; margin-bottom: 5px; font-weight: bold;}
        
        /* --- SEARCH BAR STYLES --- */
        .search-wrapper {
            text-align: center;
            margin: 20px 0 40px;
            position: relative;
            z-index: 10;
        }

        #const-search {
            width: 80%;
            max-width: 500px;
            padding: 12px 25px;
            border-radius: 30px;
            border: 2px solid rgba(255, 221, 0, 0.3);
            background: rgba(10, 15, 25, 0.8);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        #const-search:focus {
            border-color: #ffdd00;
            box-shadow: 0 0 15px rgba(255, 221, 0, 0.4);
            width: 85%;
        }

        #no-results {
            display: none;
            text-align: center;
            font-size: 20px;
            color: #ff3333;
            margin-top: 50px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* =========================================
           📱 MOBILE RESPONSIVE FIX
           ========================================= */
        @media (max-width: 768px) {
            header { padding: 60px 15px 15px; } /* Header ko thoda niche kiya taaki back button overlap na kare */
            h1 { font-size: 26px; letter-spacing: 2px; }
            .subtitle { font-size: 12px; margin-top: 5px; }

            /* Back Button */
            #back-btn { top: 15px; left: 15px; font-size: 11px; padding: 6px 12px; }

            /* Search Bar */
            #const-search { width: 90%; font-size: 14px; padding: 10px 20px; }
            #const-search:focus { width: 95%; }

            /* Gallery Grid */
            #gallery-container { padding: 15px; grid-template-columns: 1fr; gap: 20px; }
            .card-image-wrapper { height: 180px; }

            /* Modal (Popup) Mobile Fix */
            .modal-box { width: 95%; max-height: 85vh; }
            .modal-image { height: 220px; } /* Mobile par tall image achhi nahi lagti */
            .modal-info { padding: 20px; }
            .modal-title { font-size: 26px; }
            .modal-shape { font-size: 13px; margin-bottom: 15px; }
            
            /* Info Grid stack hoga */
            .info-grid { grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
            .info-item { padding: 12px; }
            
            .specialty-box { padding: 15px; font-size: 13px; line-height: 1.5; }
            
            /* Close button fix */
            .modal-close { top: 10px; right: 10px; width: 30px; height: 30px; font-size: 16px; }
        }
    </style>
</head>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const starsBg = Array.from({length: 300}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.5,
            alpha: Math.random()
        }));
        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            starsBg.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                s.alpha += (Math.random() - 0.5) * 0.05;
                if(s.alpha < 0.1) s.alpha = 0.1; if(s.alpha > 1) s.alpha = 1;
            });
            requestAnimationFrame(drawStars);
        }

        constData.sort((a, b) => a.name.localeCompare(b.name));

        const gallery = document.getElementById('gallery-container');
        const modal = document.getElementById('modal-overlay');
        const searchInput = document.getElementById('const-search');
        const noResults = document.getElementById('no-results');

        // Render Function
        function renderConstellations(filterText = "") {
            gallery.innerHTML = "";
            
            const filteredData = constData.filter(item => 
                item.name.toLowerCase().includes(filterText.toLowerCase())
            );

            if (filteredData.length === 0) {
                noResults.style.display = "block";
            } else {
                noResults.style.display = "none";
                filteredData.forEach((item) => {
                    const originalIndex = constData.findIndex(c => c.name === item.name);
                    const card = document.createElement('div');
                    card.className = 'const-card';
                    card.onclick = () => openModal(originalIndex); 

                    card.innerHTML = `
                        <div class="card-image-wrapper">
                            <img src="${item.image}" class="card-image" alt="${item.name}" loading="lazy">
                        </div>
                        <div class="card-content">
                            <div class="card-title">${item.name}</div>
                            <div class="card-shape">${item.shape}</div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            }
        }

        // Initial render
        renderConstellations();

        // Search Event Listener (Enter Key & Auto-Reset)
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                renderConstellations(e.target.value);
            }
            if (e.target.value === "") {
                renderConstellations("");
            }
        });

        // Modal Logic
        function openModal(index) {
            const data = constData[index];
            document.getElementById('m-img').src = data.image;
            document.getElementById('m-title').innerText = data.name;
            document.getElementById('m-shape').innerText = data.shape;
            document.getElementById('m-stars').innerText = data.stars;
            document.getElementById('m-north').innerText = data.northVis;
            document.getElementById('m-south').innerText = data.southVis;
            document.getElementById('m-spec').innerText = data.specialty;

            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            setTimeout(() => { document.getElementById('m-img').src = ''; }, 300);
        }

        modal.addEventListener('click', (e) => {
            if(e.target === modal) closeModal();
        });
