<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrbitX - Deep Space</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020202;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #00d2ff;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
            border: 1px solid #00d2ff;
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        #back-btn:hover { background: #00d2ff; color: #000; }

        .menu-title {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #fff;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 0, 204, 0.5);
        }
        
        .subtitle {
            color: #ff00cc;
            letter-spacing: 2px;
            margin-bottom: 50px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 80%;
            max-width: 1200px;
        }

        /* Glassmorphism Menu Cards */
        .module-card {
            background: rgba(15, 20, 30, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
            z-index: 20;
        }

        .module-card:hover {
            transform: translateY(-10px);
        }

        /* Unique hover colors for each category */
        .card-nebula:hover { border-color: #ff00cc; box-shadow: 0 10px 30px rgba(255, 0, 204, 0.2); }
        .card-blackhole:hover { border-color: #ff3333; box-shadow: 0 10px 30px rgba(255, 51, 51, 0.2); }
        .card-const:hover { border-color: #ffdd00; box-shadow: 0 10px 30px rgba(255, 221, 0, 0.2); }

        .module-card h3 {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .module-card p {
            color: #aaa;
            line-height: 1.5;
            font-size: 1rem;
        }

        /* =========================================
           📱 MOBILE RESPONSIVE FIX
           ========================================= */
        @media (max-width: 768px) {
            #ui-layer {
                justify-content: flex-start; /* Estää sisällön leikkautumisen ylhäältä */
                padding-top: 80px; 
                overflow-y: auto; /* Sallii vierityksen pienillä näytöillä */
            }
            #back-btn {
                top: 15px;
                left: 15px;
                font-size: 12px;
                padding: 6px 12px;
            }
            .menu-title {
                font-size: 2.2rem;
                margin-bottom: 5px;
                letter-spacing: 2px;
                text-align: center;
            }
            .subtitle {
                font-size: 0.9rem;
                margin-bottom: 30px;
                text-align: center;
            }
            .card-grid {
                width: 90%;
                grid-template-columns: 1fr; /* Kortit allekkain */
                gap: 20px;
                padding-bottom: 40px; 
            }
            .module-card {
                padding: 25px 20px;
            }
            .module-card h3 {
                font-size: 1.5rem;
            }
            .module-card p {
                font-size: 0.95rem;
            }
        }
        /* 🔴 EXIT BUTTON CSS */
        #exit-btn {
            position: absolute;
            top: 25px;
            right: 30px;
            color: #ff4444;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 68, 68, 0.4);
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(15, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 2000; /* Z-index high rakha hai taaki hamesha upar dikhe */
        }
        #exit-btn:hover { 
            background: #ff4444; 
            color: #fff; 
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.8); 
            border-color: #ff4444;
        }

        /* Mobile responsive ke liye */
        @media (max-width: 768px) {
            #exit-btn { top: 15px; right: 15px; font-size: 12px; padding: 6px 12px; }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        
        <a href="index.html#menu" id="exit-btn"><i class="fas fa-door-open"></i> EXIT</a>

        <h2 class="menu-title">Deep Space</h2>
        <div class="subtitle">SELECT TARGET CATEGORY</div>

        <div class="card-grid">
            
            <a href="nebulae.html" class="module-card card-nebula">
                <h3 style="color: #ff00cc;">Nebulae</h3>
                <p>Explore stellar nurseries, planetary nebulae, and supernova remnants.</p>
            </a>

            <a href="blackhole.html" class="module-card card-blackhole">
                <h3 style="color: #ff3333;">Black Holes</h3>
                <p>Simulate event horizons and explore the most extreme objects in the universe.</p>
            </a>

            <a href="const.html" class="module-card card-const">
                <h3 style="color: #ffdd00;">Constellations</h3>
                <p>Discover night sky patterns, mythologies, and astronomical facts.</p>
            </a>

        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // Slow rotating starfield background
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 1;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const starGeo = new THREE.BufferGeometry();
        const starCount = 6000;
        const starVertices = [];

        for(let i=0; i<starCount; i++) {
            const x = (Math.random() - 0.5) * 600;
            const y = (Math.random() - 0.5) * 600;
            const z = (Math.random() - 0.5) * 600;
            starVertices.push(x, y, z);
        }

        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        function animate() {
            stars.rotation.y += 0.0005; // Slow ambient rotation
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
